<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyilik Köprüsü | Dijital Vakıf Platformu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        :root { --brand: #0f172a; --accent: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; overflow-x: hidden; background: #fcfcfd; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .section-page { display: none; }
        .section-page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .toy-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; background: white; }
        .toy-card:hover { transform: translateY(-8px); border-color: #2563eb; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        
        #admin-panel { display: none; background: #fffbeb; border: 1px dashed #f59e0b; padding: 1rem; border-radius: 1rem; margin-bottom: 2rem; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-flex; }
        .is-admin #admin-panel { display: block; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="glass-nav fixed top-0 w-full z-50 h-20 px-6">
        <div class="max-w-7xl mx-auto h-full flex justify-between items-center">
            <button onclick="showSection('home')" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg rotate-12 flex items-center justify-center text-white font-bold">İ</div>
                <span class="font-extrabold text-slate-900 text-xl tracking-tight">İyilik Köprüsü</span>
            </button>

            <div class="flex items-center gap-6">
                <button onclick="toggleSepet()" class="relative p-2 text-slate-600 hover:text-blue-600 transition">
                    <i data-lucide="shopping-bag"></i>
                    <span id="sepet-sayac" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
                <div id="user-display" class="hidden text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase leading-none">Profil</p>
                    <p id="user-name" class="text-xs font-bold italic">...</p>
                </div>
                <button id="login-btn" onclick="toggleAuthModal()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition">Giriş</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        
        <section id="sec-home" class="section-page active">
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                <div data-aos="fade-right">
                    <span class="inline-block px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-full mb-4">TÜBİTAK 4006 Projesi</span>
                    <h1 class="serif text-6xl leading-tight mb-6">Eski Dostlar,<br><span class="italic text-slate-400">Yeni Gülüşler.</span></h1>
                    <p class="text-slate-500 text-lg mb-8 leading-relaxed">Oyuncaklarını paylaş, puanlarını topla ve iyilik zincirine katıl. Atıl duran her oyuncak başka bir çocuğun dünyasını aydınlatabilir.</p>
                    <button onclick="showSection('catalog')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-blue-100 hover:scale-105 transition">Kataloğu Keşfet</button>
                </div>
                <div class="relative" data-aos="zoom-in">
                    <img src="https://images.unsplash.com/photo-1531303435785-3853ba035cda?q=80&w=800" class="rounded-[3rem] shadow-2xl grayscale-[20%] hover:grayscale-0 transition duration-700" alt="Bağış">
                </div>
            </div>
        </section>

        <section id="sec-catalog" class="section-page">
            <div id="admin-panel">
                <div class="flex items-center justify-between">
                    <h3 class="font-bold text-amber-800 flex items-center gap-2"><i data-lucide="shield-check"></i> Yönetici Paneli Aktif</h3>
                    <button onclick="yeniUrunEkle()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Yeni Ürün Ekle</button>
                </div>
            </div>

            <div class="flex justify-between items-end mb-12">
                <h2 class="serif text-4xl italic">Oyuncak Vitrini</h2>
                <div class="flex gap-4">
                    <input type="text" id="search-input" placeholder="Oyuncak ara..." class="px-4 py-2 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
            </div>
            
            <div id="catalog-container" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                </div>
        </section>

    </main>

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl">
            <h3 class="serif text-2xl mb-6 italic">Giriş Yap</h3>
            <input type="text" id="auth-name" placeholder="Ad Soyad" class="w-full mb-4 p-4 bg-slate-50 rounded-2xl outline-none border-none focus:ring-2 focus:ring-blue-600 transition">
            <input type="tel" id="auth-phone" placeholder="Telefon (05xx...)" class="w-full mb-6 p-4 bg-slate-50 rounded-2xl outline-none border-none focus:ring-2 focus:ring-blue-600 transition">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100">Devam Et</button>
            <button onclick="toggleAuthModal()" class="w-full mt-2 text-slate-400 text-xs font-bold py-2">Vazgeç</button>
        </div>
    </div>

    <aside id="sepet-sidebar" class="fixed right-[-400px] top-0 w-[380px] h-full bg-white z-[60] shadow-2xl transition-all duration-500 flex flex-col">
        <div class="p-8 border-b flex justify-between items-center">
            <h3 class="serif text-xl italic">İyilik Sepetin</h3>
            <button onclick="toggleSepet()" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="sepet-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-8 bg-slate-50 border-t">
            <div class="flex justify-between mb-6">
                <span class="font-bold text-slate-400 uppercase text-[10px]">Toplam Puan</span>
                <span id="total-puan" class="text-2xl font-black">0</span>
            </div>
            <button onclick="siparisVer()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Bağışı Onayla</button>
        </div>
    </aside>

    <script>
        // API Bilgileri
        const API_KEY = "patMISUVizhCfvRsg";
        const API_URL = "https://iyilikkoprusu-api.eensarerkul.workers.dev";
        const ADMIN_NUMBERS = ["05051234567"]; // Yönetici telefonlarını buraya ekle

        let currentUrunler = [];
        let sepet = [];
        let user = JSON.parse(localStorage.getItem('ik_user')) || null;

        // Başlatıcı
        window.onload = () => {
            AOS.init();
            lucide.createIcons();
            updateUserUI();
            fetchCatalog();
        };

        // API Fonksiyonları
        async function fetchCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '<div class="col-span-full text-center py-20 opacity-50 italic">Katalog yükleniyor...</div>';
            
            try {
                const response = await fetch(`${API_URL}/katalog`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                const data = await response.json();
                currentUrunler = data.records || [];
                renderCatalog(currentUrunler);
            } catch (error) {
                console.error("Hata:", error);
                container.innerHTML = '<div class="col-span-full text-rose-500 text-center py-20">API bağlantısı kurulamadı.</div>';
            }
        }

        function renderCatalog(items) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = items.map(item => {
                const f = item.fields;
                const photo = (f["Fotoğraf"] && f["Fotoğraf"][0]) ? f["Fotoğraf"][0].url : 'https://images.unsplash.com/photo-1558060370-d644479cb6f7?q=80&w=400';
                
                return `
                <div class="toy-card p-4 rounded-[2.5rem] flex flex-col h-full" data-aos="fade-up">
                    <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden mb-4 bg-slate-100">
                        <img src="${photo}" class="w-full h-full object-cover">
                        <div class="admin-only absolute top-3 right-3 flex gap-2">
                            <button onclick="urunSil('${item.id}')" class="bg-white/90 p-2 rounded-xl text-rose-500 hover:bg-rose-500 hover:text-white transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="px-2">
                        <span class="text-[9px] font-black uppercase tracking-widest text-blue-600 mb-1 block">${f["Kategori"] || 'Genel'}</span>
                        <h4 class="font-bold text-slate-800 mb-4 line-clamp-1">${f["Oyuncak Adı"]}</h4>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black">${f["Puan Değeri"] || 0} <span class="text-[10px] text-slate-400">Puan</span></span>
                            <button onclick="sepeteEkle('${item.id}', '${f["Oyuncak Adı"]}', ${f["Puan Değeri"]}, '${photo}')" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-blue-600 transition">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // Sepet İşlemleri
        function sepeteEkle(id, ad, puan, img) {
            if(sepet.find(x => x.id === id)) return;
            sepet.push({id, ad, puan, img});
            updateSepetUI();
            if(!document.getElementById('sepet-sidebar').classList.contains('right-0')) toggleSepet();
        }

        function updateSepetUI() {
            const container = document.getElementById('sepet-items');
            document.getElementById('sepet-sayac').innerText = sepet.length;
            
            if(sepet.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-slate-300 italic">Sepetin boş.</p>';
            } else {
                container.innerHTML = sepet.map((x, i) => `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl">
                        <img src="${x.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1 font-bold text-xs">${x.ad}</div>
                        <button onclick="sepettenCikar(${i})" class="text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `).join('');
            }
            document.getElementById('total-puan').innerText = sepet.reduce((a, b) => a + b.puan, 0);
            lucide.createIcons();
        }

        function sepettenCikar(index) {
            sepet.splice(index, 1);
            updateSepetUI();
        }

        async function siparisVer() {
            if(!user) { toggleAuthModal(); return; }
            if(sepet.length === 0) return;

            const t_kodu = Math.floor(1000 + Math.random() * 9000).toString();
            
            try {
                const response = await fetch(`${API_URL}/siparis`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        "Ad Soyad": user.name,
                        "Telefon": user.phone,
                        "Ürünler": sepet.map(x => x.id),
                        "Teslimat Kodu": t_kodu,
                        "Durum": "Hazırlanıyor"
                    })
                });

                if(response.ok) {
                    alert(`İyilik Talebin Alındı!\nTeslimat Kodun: ${t_kodu}`);
                    sepet = [];
                    updateSepetUI();
                    toggleSepet();
                }
            } catch (e) { alert("Sipariş sırasında bir hata oluştu."); }
        }

        // Kullanıcı & Admin Yönetimi
        function handleLogin() {
            const name = document.getElementById('auth-name').value;
            const phone = document.getElementById('auth-phone').value;
            if(!name || !phone) return;

            user = { name, phone };
            localStorage.setItem('ik_user', JSON.stringify(user));
            updateUserUI();
            toggleAuthModal();
        }

        function updateUserUI() {
            const display = document.getElementById('user-display');
            const loginBtn = document.getElementById('login-btn');
            
            if(user) {
                display.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.name;
                loginBtn.innerText = "Çıkış";
                loginBtn.onclick = logout;
                
                // Admin Kontrolü
                if(ADMIN_NUMBERS.includes(user.phone)) {
                    document.body.classList.add('is-admin');
                }
            } else {
                display.classList.add('hidden');
                loginBtn.innerText = "Giriş";
                loginBtn.onclick = toggleAuthModal;
                document.body.classList.remove('is-admin');
            }
        }

        function logout() {
            localStorage.removeItem('ik_user');
            user = null;
            updateUserUI();
        }

        // Arayüz Yardımcıları
        function showSection(id) {
            document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleAuthModal() {
            const m = document.getElementById('auth-modal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function toggleSepet() {
            const s = document.getElementById('sepet-sidebar');
            s.style.right = s.style.right === '0px' ? '-400px' : '0px';
        }

        // Admin İşlemleri (Örnek Fonksiyonlar)
        async function urunSil(id) {
            if(!confirm("Bu ürünü silmek istediğine emin misin?")) return;
            try {
                await fetch(`${API_URL}/katalog/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                fetchCatalog();
            } catch (e) { alert("Silme hatası."); }
        }
    </script>
</body>
</html>
